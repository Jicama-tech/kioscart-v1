<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="KiosCart - Online Platform for Kiosk and Cart Management. Manage your e-shop, products, and orders seamlessly." />
  <meta name="theme-color" content="#6366f1" />

  <title>KiosCart - Online Platform for Kiosk and Cart Management</title>
  <meta name="author" content="Jicama.Tech" />

  <!-- OG Meta Tags (Nginx sub_filter replaces these per custom domain) -->
  <meta property="og:title" content="KiosCart - E-Shop Management" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://kioscart.com/" />
  <meta property="og:description" content="Online Platform for Kiosk and Cart Management" />
  <meta property="og:image" content="https://kioscart.com/KiosCart.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:site_name" content="KiosCart" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="KiosCart - E-Shop Management" />
  <meta name="twitter:description" content="Online Platform for Kiosk and Cart Management" />
  <meta name="twitter:image" content="https://kioscart.com/KiosCart.png" />

  <link rel="icon" href="/KiosCart.png" type="image/png" />

  <!-- Preconnect to external resources -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
  <link rel="dns-prefetch" href="https://fonts.gstatic.com" />

  <!-- Preload the critical font to avoid render-blocking -->
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" media="print" onload="this.media='all'" />
  <noscript>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" />
  </noscript>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
